<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Classroom Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <h2>SCA</h2>
            <p>Smart Classroom Attendance</p>
        </div>

        <ul>
            <li class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-user-group"></i>
                Data Siswa
            </li>

            <li>
                <i class="fa-solid fa-qrcode"></i>
                Scan QR
            </li>

            <li>
                <i class="fa-solid fa-chart-column"></i>
                Laporan
            </li>
        </ul>

    </div>

    <!-- Content -->
    <div class="content">

        <!-- Header -->
        <nav>

            <div>

                <h3 id="salam">Selamat Datang</h3>

                <p id="tanggal"></p>

                <h5 id="jam"></h5>

            </div>

            <div>
                <img src="https://i.pravatar.cc/60" alt="Foto Guru">
            </div>

        </nav>

        <!-- Statistik -->
        <div class="row g-4 mt-3">

            <div class="col-lg-3">

                <div class="card-box">

                    <h5>Jumlah Siswa</h5>

                    <h1 class="counter">36</h1>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="card-box green">

                    <h5>Hadir</h5>

                    <h1 class="counter">31</h1>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="card-box yellow">

                    <h5>Izin</h5>

                    <h1 class="counter">2</h1>

                </div>

            </div>

            <div class="col-lg-3">

                <div class="card-box red">

                    <h5>Sakit</h5>

                    <h1 class="counter">3</h1>

                </div>

            </div>

        </div>

        <!-- Tabel -->
        <div class="card mt-4">

            <div class="card-body">

                <h4 class="mb-4">Absensi Hari Ini</h4>

                <table class="table table-hover">

                    <thead>

                        <tr>

                            <th>Nama</th>

                            <th>Status</th>

                            <th>Jam</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>Ahmad Fauzi</td>

                            <td>
                                <span class="badge bg-success">
                                    Hadir
                                </span>
                            </td>

                            <td>06.58</td>

                        </tr>

                        <tr>

                            <td>Citra</td>

                            <td>
                                <span class="badge bg-warning text-dark">
                                    Izin
                                </span>
                            </td>

                            <td>-</td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="assets/js/app.js"></script>

</body>

</html>
